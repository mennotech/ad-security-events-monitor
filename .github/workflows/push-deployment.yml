name: Dispatch Downstream Deployments

on:
  push:
    branches: [testing, main]

permissions:
  contents: read

jobs:
  build_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build org matrix
        id: build
        shell: bash
        env:
          DOWNSTREAM_REPOS: ${{ vars.DOWNSTREAM_REPOS }}
        run: |
          set -euo pipefail

          if [ -z "${DOWNSTREAM_REPOS}" ]; then
            echo "DOWNSTREAM_REPOS is empty."
            exit 1
          fi

          # Build a JSON object: { "org": ["repo1","repo2"] }
          json='{}'
          while IFS= read -r repo; do
            repo="$(echo "$repo" | xargs)"
            [ -z "$repo" ] && continue

            org="${repo%%/*}"
            name="${repo##*/}"

            json="$(echo "$json" | jq --arg org "$org" --arg name "$name" '
              .[$org] = ((.[$org] // []) + [$name])
            ')"
          done <<< "${DOWNSTREAM_REPOS}"

          # Convert to matrix include list: [{"owner":"org","repos":"r1,r2"}]
          matrix="$(echo "$json" | jq -c '
            to_entries
            | map({owner: .key, repos: (.value | join(","))})
          ')"

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  dispatch:
    needs: build_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.build_matrix.outputs.matrix) }}
    steps:
      - name: Create app token for org
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          owner: ${{ matrix.owner }}
          repositories: ${{ matrix.repos }}

      - name: Dispatch to repos in org
        shell: bash
        env:
          DISPATCH_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ matrix.owner }}
          REPOS: ${{ matrix.repos }}
          EVENT_TYPE: ${{ github.ref_name == 'testing' && 'script-deploy-testing' || 'script-deploy-broad' }}
          WAIT_TIMEOUT_SECONDS: "1200"
          POLL_INTERVAL_SECONDS: "20"
        run: |
          set -euo pipefail

          failures=0
          successes=0
          IFS=',' read -r -a repos <<< "${REPOS}"
          for name in "${repos[@]}"; do
            name="$(echo "$name" | xargs)"
            [ -z "$name" ] && continue

            correlation_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${OWNER}-${name}-$(date +%s)"
            dispatched_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            request_body="$(jq -cn \
              --arg event_type "${EVENT_TYPE}" \
              --arg correlation_id "${correlation_id}" \
              --arg upstream_repo "${GITHUB_REPOSITORY}" \
              --arg upstream_run_id "${GITHUB_RUN_ID}" \
              --arg upstream_run_attempt "${GITHUB_RUN_ATTEMPT}" \
              --arg upstream_sha "${GITHUB_SHA}" \
              --arg dispatched_at "${dispatched_at}" \
              '{
                event_type: $event_type,
                client_payload: {
                  correlation_id: $correlation_id,
                  upstream_repo: $upstream_repo,
                  upstream_run_id: $upstream_run_id,
                  upstream_run_attempt: $upstream_run_attempt,
                  upstream_sha: $upstream_sha,
                  dispatched_at: $dispatched_at
                }
              }')"

            echo "Dispatching to ${OWNER}/${name}"
            response_file="$(mktemp)"
            status_code="$(curl -sS -o "${response_file}" -w "%{http_code}" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${OWNER}/${name}/dispatches \
              -d "${request_body}")"

            if [ "${status_code}" = "204" ]; then
              echo "Dispatch OK for ${OWNER}/${name}"
            else
              echo "Dispatch FAILED for ${OWNER}/${name} (HTTP ${status_code})"
              cat "${response_file}"
              failures=$((failures + 1))
              rm -f "${response_file}"
              continue
            fi

            rm -f "${response_file}"

            echo "Polling downstream workflow run for ${OWNER}/${name}"
            timeout_at=$(( $(date +%s) + WAIT_TIMEOUT_SECONDS ))
            found_run=0
            run_finished=0

            while [ "$(date +%s)" -lt "${timeout_at}" ]; do
              runs_json="$(curl -sS \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${OWNER}/${name}/actions/runs?event=repository_dispatch&per_page=50")"

              selected_run="$(echo "${runs_json}" | jq -c --arg since "${dispatched_at}" '
                .workflow_runs
                | map(select(.created_at >= $since))
                | sort_by(.created_at)
                | reverse
                | .[0] // empty
              ')"

              if [ -n "${selected_run}" ]; then
                found_run=1
                run_id="$(echo "${selected_run}" | jq -r '.id')"
                run_name="$(echo "${selected_run}" | jq -r '.name')"
                run_status="$(echo "${selected_run}" | jq -r '.status')"
                run_conclusion="$(echo "${selected_run}" | jq -r '.conclusion // "null"')"
                run_url="$(echo "${selected_run}" | jq -r '.html_url')"

                echo "Downstream run for ${OWNER}/${name}: id=${run_id} name=${run_name} status=${run_status} conclusion=${run_conclusion}"
                echo "Run URL: ${run_url}"

                if [ "${run_status}" = "completed" ]; then
                  run_finished=1
                  if [ "${run_conclusion}" = "success" ]; then
                    echo "Downstream run succeeded for ${OWNER}/${name}"
                    successes=$((successes + 1))
                  else
                    echo "Downstream run failed for ${OWNER}/${name}"
                    failures=$((failures + 1))
                  fi
                  break
                fi
              else
                echo "No downstream run found yet for ${OWNER}/${name}; waiting ${POLL_INTERVAL_SECONDS}s"
              fi

              sleep "${POLL_INTERVAL_SECONDS}"
            done

            if [ "${found_run}" = "0" ]; then
              echo "Timed out waiting for downstream run to appear for ${OWNER}/${name}"
              failures=$((failures + 1))
            elif [ "${run_finished}" = "0" ]; then
              echo "Timed out waiting for downstream run completion for ${OWNER}/${name}"
              failures=$((failures + 1))
            fi
          done

          echo "Dispatch summary: successes=${successes} failures=${failures}"

          if [ "${failures}" -gt 0 ]; then
            echo "${failures} dispatch and/or downstream workflow check(s) failed."
            exit 1
          fi
